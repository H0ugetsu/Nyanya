<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Nyanya</title>
    <style>
      body {
        font-family: sans-serif;
        width: 200px;
        padding: 12px;
      }
      .phase {
        text-align: center;
        font-size: 12px;
        color: #666;
        text-transform: uppercase;
      }
      .timer {
        font-size: 32px;
        text-align: center;
        margin: 8px 0;
        font-variant-numeric: tabular-nums;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
      }
      input:disabled {
        background: #eee;
        color: #999;
      }
      .buttons {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 6px;
      }
      .session-count {
        text-align: center;
        font-size: 12px;
        color: #666;
        margin-top: 12px;
      }
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
      }
      .settings {
        margin-top: 12px;
        padding-top: 8px;
        border-top: 1px solid #ddd;
      }
      .test-button {
        width: 100%;
        margin-top: 6px;
        padding: 4px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="phase" id="phase">idle</div>
    <div class="timer" id="timer">--:--</div>
    <label>
      作業時間(分)
      <input type="number" id="workMinutes" min="1" value="25" />
    </label>
    <label>
      休憩時間(分)
      <input type="number" id="breakMinutes" min="1" value="5" />
    </label>
    <div class="buttons">
      <button id="primaryButton">開始</button>
      <button id="resetButton" hidden>リセット</button>
    </div>
    <div class="session-count" id="sessionCount">今日の完了セッション数: 0</div>
    <div class="settings">
      <label>
        通知音
        <select id="soundSelect">
          <option value="bell">ベル</option>
          <option value="chime">チャイム</option>
          <option value="pop">ポップ</option>
        </select>
      </label>
      <label>
        音量
        <input type="range" id="volumeRange" min="0" max="100" value="70" />
      </label>
      <button class="test-button" id="testSoundButton">試聴</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
