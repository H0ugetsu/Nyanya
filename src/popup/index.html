<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Nyanya</title>
    <style>
      body {
        font-family: sans-serif;
        width: 200px;
        padding: 12px;
      }
      .phase {
        text-align: center;
        font-size: 12px;
        color: #666;
        text-transform: uppercase;
      }
      .timer {
        font-size: 32px;
        text-align: center;
        margin: 8px 0;
        font-variant-numeric: tabular-nums;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
      }
      button {
        width: 100%;
        margin-top: 12px;
        padding: 6px;
      }
    </style>
  </head>
  <body>
    <div class="phase" id="phase">idle</div>
    <div class="timer" id="timer">--:--</div>
    <label>
      作業時間(分)
      <input type="number" id="workMinutes" min="1" value="25" />
    </label>
    <label>
      休憩時間(分)
      <input type="number" id="breakMinutes" min="1" value="5" />
    </label>
    <button id="startButton">開始</button>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
