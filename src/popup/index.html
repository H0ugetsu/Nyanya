<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Nyanya</title>
    <style>
      :root {
        --calico-white: #f3eff4;
        --calico-brown: #eda44f;
        --calico-brown-dark: #c9863a;
        --calico-pink: #e6859d;
        --calico-pink-dark: #c9647e;
        --calico-black: #1c1c1e;
        --border: rgba(28, 28, 30, 0.14);
      }
      body {
        font-family: sans-serif;
        width: 220px;
        padding: 14px;
        background: var(--calico-white);
        color: var(--calico-black);
      }
      .cat-stage {
        position: relative;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        margin-bottom: 4px;
      }
      .cat {
        display: inline-block;
        transform-origin: center bottom;
      }
      .zzz {
        position: absolute;
        top: 0;
        right: 32%;
        font-size: 16px;
        opacity: 0;
      }
      .cat-stage.work .cat {
        animation: cat-pulse 1.6s ease-in-out infinite;
      }
      .cat-stage.break .cat {
        animation: cat-sway 3s ease-in-out infinite;
      }
      .cat-stage.break .zzz {
        animation: zzz-float 3s ease-in-out infinite;
      }
      .cat-stage.stretch .cat {
        animation: cat-stretch 0.8s ease-in-out;
      }
      @keyframes cat-pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.12);
        }
      }
      @keyframes cat-sway {
        0%,
        100% {
          transform: rotate(-6deg);
        }
        50% {
          transform: rotate(6deg);
        }
      }
      @keyframes zzz-float {
        0% {
          opacity: 0;
          transform: translateY(0);
        }
        30% {
          opacity: 1;
        }
        100% {
          opacity: 0;
          transform: translateY(-16px);
        }
      }
      @keyframes cat-stretch {
        0% {
          transform: scale(1, 1);
        }
        30% {
          transform: scale(1.3, 0.75);
        }
        60% {
          transform: scale(0.9, 1.15);
        }
        100% {
          transform: scale(1, 1);
        }
      }
      .phase {
        text-align: center;
        font-size: 12px;
        color: var(--calico-black);
        text-transform: uppercase;
        opacity: 0.6;
      }
      .timer {
        font-size: 32px;
        text-align: center;
        margin: 8px 0;
        font-variant-numeric: tabular-nums;
        color: var(--calico-brown-dark);
        font-weight: bold;
      }
      label {
        display: block;
        margin-top: 8px;
        font-size: 12px;
      }
      input,
      select {
        width: 100%;
        box-sizing: border-box;
        margin-top: 2px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 4px 6px;
        background: #fff;
        color: var(--calico-black);
      }
      input:disabled {
        background: #e8e4e9;
        color: #9a959c;
      }
      .buttons {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }
      button {
        flex: 1;
        padding: 8px;
        border: none;
        border-radius: 10px;
        background: var(--calico-brown);
        color: #fff;
        font-weight: bold;
        cursor: pointer;
      }
      button:hover {
        background: var(--calico-brown-dark);
      }
      #resetButton {
        background: #fff;
        color: var(--calico-black);
        border: 1px solid var(--border);
      }
      #resetButton:hover {
        background: var(--calico-white);
      }
      .session-count {
        text-align: center;
        font-size: 12px;
        color: var(--calico-black);
        margin-top: 12px;
        opacity: 0.8;
      }
      .test-button {
        width: 100%;
        margin-top: 12px;
        padding: 6px;
        font-size: 12px;
        background: #fff;
        color: var(--calico-pink-dark);
        border: 1px solid var(--calico-pink);
      }
      .test-button:hover {
        background: var(--calico-pink);
        color: #fff;
      }
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 4px;
      }
      .app-title {
        font-weight: bold;
        font-size: 14px;
        color: var(--calico-brown-dark);
      }
      .icon-button {
        flex: none;
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 8px;
        background: #fff;
        border: 1px solid var(--border);
        color: var(--calico-black);
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon-button:hover {
        background: var(--calico-white);
      }
      .settings-title {
        margin: 0 0 8px;
        font-size: 14px;
        text-align: center;
        color: var(--calico-black);
      }
      .settings-actions {
        display: flex;
        gap: 6px;
        margin-top: 12px;
      }
      #settingsCancelButton {
        background: #fff;
        color: var(--calico-black);
        border: 1px solid var(--border);
      }
      #settingsCancelButton:hover {
        background: var(--calico-white);
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <span class="app-title">Nyanya</span>
      <button class="icon-button" id="settingsButton" type="button" aria-label="設定">⚙️</button>
    </div>
    <div id="mainView">
      <div class="cat-stage" id="catStage">
        <span class="cat" id="cat">🐱</span>
        <span class="zzz" id="catZzz" aria-hidden="true">💤</span>
      </div>
      <div class="phase" id="phase">idle</div>
      <div class="timer" id="timer">--:--</div>
      <label>
        作業時間(分)
        <input type="number" id="workMinutes" min="1" value="25" />
      </label>
      <label>
        休憩時間(分)
        <input type="number" id="breakMinutes" min="1" value="5" />
      </label>
      <div class="buttons">
        <button id="primaryButton">開始</button>
        <button id="resetButton" hidden>リセット</button>
      </div>
      <div class="session-count" id="sessionCount">今日の完了セッション数: 0</div>
    </div>
    <div id="settingsPanel" hidden>
      <h2 class="settings-title">設定</h2>
      <label>
        通知音
        <select id="soundSelect">
          <option value="bell">ベル</option>
          <option value="chime">チャイム</option>
          <option value="pop">ポップ</option>
        </select>
      </label>
      <label>
        音量
        <input type="range" id="volumeRange" min="0" max="100" value="70" />
      </label>
      <button class="test-button" id="testSoundButton" type="button">試聴</button>
      <div class="settings-actions">
        <button id="settingsCancelButton" type="button">キャンセル</button>
        <button id="settingsConfirmButton" type="button">確定</button>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
